<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Food Scanner">
<title>Heart Health Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #080d14; --surface: #0c1520; --border: #1e293b;
    --blue-dark: #1e3a5f; --blue: #1d4ed8; --blue-light: #93c5fd;
    --text: #f1f5f9; --muted: #475569; --dim: #334155;
    --green: #4ade80; --green-bg: #052e16; --green-border: #14532d;
    --yellow: #fbbf24; --yellow-bg: #1c1400; --yellow-border: #d97706;
    --red: #f87171; --red-bg: #1a0000; --red-border: #7f1d1d;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
  body { padding: env(safe-area-inset-top, 20px) 16px env(safe-area-inset-bottom, 20px); display: flex; flex-direction: column; align-items: center; }

  .header { text-align: center; margin: 32px 0 28px; }
  .pill { display: inline-flex; align-items: center; gap: 8px; background: #0f1923; border: 1px solid var(--blue-dark); border-radius: 100px; padding: 6px 18px; margin-bottom: 14px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
  .pill-label { font-size: 11px; color: var(--muted); letter-spacing: 0.15em; font-family: 'DM Mono', monospace; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(30px, 8vw, 40px); color: var(--text); letter-spacing: -0.02em; line-height: 1.1; }
  .subtitle { margin-top: 8px; color: var(--muted); font-size: 14px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 18px; }

  .tabs { display: grid; grid-template-columns: 1fr 1fr 1fr; background: var(--bg); border-radius: 10px; padding: 4px; gap: 0; }
  .tab { padding: 10px 0; border-radius: 7px; border: none; cursor: pointer; background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; transition: all 0.2s; }
  .tab.active { background: var(--blue-dark); color: var(--blue-light); }

  .field-label { font-size: 12px; color: var(--muted); letter-spacing: 0.08em; font-family: 'DM Mono', monospace; margin-bottom: 8px; display: block; }
  input[type=text] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; color: var(--text); font-size: 16px; font-family: 'DM Sans', sans-serif; outline: none; -webkit-appearance: none; }
  input[type=text]:focus { border-color: var(--blue-dark); }
  .hint { font-size: 12px; color: var(--dim); margin-top: 6px; }

  .drop-zone { border: 2px dashed var(--blue-dark); border-radius: 12px; padding: 40px 20px; cursor: pointer; text-align: center; transition: border-color 0.2s; }
  .drop-zone:active { border-color: var(--blue-light); }
  .drop-icon { font-size: 32px; margin-bottom: 10px; }
  .drop-text { color: var(--muted); font-size: 14px; }
  .drop-sub { color: var(--dim); font-size: 12px; margin-top: 6px; }
  #preview { width: 100%; border-radius: 10px; display: block; }

  .btn-scan { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); border: none; border-radius: 10px; padding: 15px; color: var(--blue-light); font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; width: 100%; transition: opacity 0.2s; }
  .btn-scan:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-back { background: transparent; border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: var(--muted); font-size: 13px; cursor: pointer; font-family: 'DM Mono', monospace; letter-spacing: 0.08em; width: 100%; margin-top: 4px; }

  .error-box { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 8px; padding: 10px 14px; color: #fca5a5; font-size: 12px; font-family: 'DM Mono', monospace; word-break: break-word; }

  /* Result */
  .result-wrap { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 14px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; }
  .result-top { display: flex; align-items: flex-start; gap: 18px; margin-bottom: 20px; }
  .ring-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-score { font-size: 28px; font-weight: 800; font-family: 'DM Mono', monospace; line-height: 1; }
  .ring-denom { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; margin-top: 2px; }
  .product-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; font-family: 'DM Mono', monospace; margin-bottom: 6px; }
  .product-name { font-size: 17px; color: var(--text); font-weight: 600; line-height: 1.3; margin-bottom: 12px; }
  .verdict-badge { display: inline-flex; padding: 6px 16px; border-radius: 6px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.12em; }

  .nutrient-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 18px; }
  .nutrient-cell { border-radius: 8px; padding: 10px 12px; }
  .nutrient-key { font-size: 10px; color: var(--muted); letter-spacing: 0.08em; font-family: 'DM Mono', monospace; margin-bottom: 3px; }
  .nutrient-val { font-size: 18px; font-weight: 700; font-family: 'DM Mono', monospace; }

  .reasons { display: flex; flex-direction: column; gap: 8px; }
  .reason-row { display: flex; gap: 12px; align-items: flex-start; background: var(--bg); border-radius: 8px; padding: 10px 14px; }
  .reason-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .reason-text { color: #94a3b8; font-size: 14px; line-height: 1.5; }

  .flag-card { background: var(--red-bg); border: 1px solid var(--red-border); border-radius: 12px; padding: 16px 20px; }
  .flag-title { font-size: 11px; color: var(--red); letter-spacing: 0.1em; font-family: 'DM Mono', monospace; margin-bottom: 10px; }
  .flag-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .flag-chip { background: #2d0000; border: 1px solid #991b1b; border-radius: 4px; padding: 4px 10px; color: #fca5a5; font-size: 12px; font-family: 'DM Mono', monospace; }

  .footer { margin-top: 28px; color: #1e293b; font-size: 11px; text-align: center; font-family: 'DM Mono', monospace; padding-bottom: 20px; }

  #spinner { display: none; }
  .spinning { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="header">
  <div class="pill"><div class="dot"></div><span class="pill-label">HEART HEALTH SCANNER</span></div>
  <h1>Is This Worth<br>Eating?</h1>
  <p class="subtitle">Scored for low HDL / elevated LDL</p>
</div>

<!-- INPUT CARD -->
<div class="card" id="input-card">
  <div class="tabs">
    <button class="tab" data-mode="upc" onclick="setMode('upc')">📦 UPC</button>
    <button class="tab active" data-mode="search" onclick="setMode('search')">🔍 SEARCH</button>
    <button class="tab" data-mode="photo" onclick="setMode('photo')">📷 PHOTO</button>
  </div>

  <div id="text-input-wrap">
    <label class="field-label" id="field-label">PRODUCT NAME</label>
    <input type="text" id="text-input" placeholder="e.g. Honey Nut Cheerios" autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter') scan()">
    <p class="hint" id="hint-text">One product at a time — be specific with brand name</p>
  </div>

  <div id="photo-wrap" style="display:none">
    <div class="drop-zone" onclick="document.getElementById('file-input').click()">
      <div id="drop-inner">
        <div class="drop-icon">🏷️</div>
        <p class="drop-text">Tap to upload a photo of the nutrition label</p>
        <p class="drop-sub">JPG, PNG, HEIC</p>
      </div>
      <img id="preview" style="display:none">
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
  </div>

  <div id="error-box" class="error-box" style="display:none"></div>

  <button class="btn-scan" id="scan-btn" onclick="scan()">SCAN THIS PRODUCT →</button>
</div>

<!-- RESULT -->
<div class="result-wrap" id="result-wrap" style="display:none">
  <div class="result-card">
    <div class="result-top">
      <div class="ring-wrap">
        <svg width="110" height="110" id="ring-svg">
          <circle cx="55" cy="55" r="42" fill="none" stroke="#1e293b" stroke-width="8"/>
          <circle cx="55" cy="55" r="42" fill="none" stroke="#4ade80" stroke-width="8" stroke-linecap="round" id="ring-fill" stroke-dasharray="0 263.9"/>
        </svg>
        <div class="ring-center">
          <span class="ring-score" id="ring-score-text">0</span>
          <span class="ring-denom">/ 10</span>
        </div>
      </div>
      <div style="flex:1">
        <p class="product-label">PRODUCT</p>
        <p class="product-name" id="product-name-text"></p>
        <div class="verdict-badge" id="verdict-badge"></div>
      </div>
    </div>
    <div class="nutrient-grid" id="nutrient-grid"></div>
    <div class="reasons" id="reasons-list"></div>
  </div>
  <div class="flag-card" id="flag-card" style="display:none">
    <p class="flag-title">⚑ FLAGGED INGREDIENTS</p>
    <div class="flag-chips" id="flag-chips"></div>
  </div>
  <button class="btn-back" onclick="reset()">← SCAN ANOTHER PRODUCT</button>
</div>

<p class="footer">SCORED AGAINST YOUR LIPID PROFILE · NOT MEDICAL ADVICE</p>

<script>
const SYSTEM_PROMPT = `You are a heart-health food scanner. Analyze nutrition labels and ingredients for someone with low HDL, elevated LDL and total cholesterol. Diet is their primary intervention — no medications yet.

SCORING RULES (rate 1-10):
- Start at 7 (neutral)
- Trans fats present: immediate score of 1, verdict SKIP IT
- Saturated fat > 3g per serving: -2 points
- Saturated fat 2-3g: -1 point
- Added sugars > 10g: -2 points
- Added sugars 5-10g: -1 point
- Coconut oil or palm oil in ingredients: -2 points
- Partially hydroginstead oils: immediate score of 1, verdict SKIP IT
- Processed meat indicators (nitrates, nitrites): -2 points
- Dietary fiber >= 3g: +1 point
- Dietary fiber >= 5g: +2 points (instead of +1)
- Primary fat source is olive oil or avocado oil: +1 point
- Omega-3s listed (DHA, EPA, flaxseed, chia): +1 point
- Low/no added sugar (< 2g): +1 point
- Short whole-food ingredient list (under 8 ingredients, all recognizable): +1 point

VERDICT: 8-10 = BUY IT, 5-7 = LIMIT IT, 1-4 = SKIP IT
verdictColor: "green" for BUY IT, "yellow" for LIMIT IT, "red" for SKIP IT

Respond ONLY with raw JSON, no markdown, no backticks, no extra text:
{"productName":"...","score":7,"verdict":"LIMIT IT","verdictColor":"yellow","reasons":["reason1","reason2"],"flaggedIngredients":[],"nutritionHighlights":{"saturatedFat":"Xg","transFat":"Xg","addedSugars":"Xg","fiber":"Xg"}}`;

let currentMode = 'search';
let imageBase64 = null;

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  const isPhoto = mode === 'photo';
  document.getElementById('text-input-wrap').style.display = isPhoto ? 'none' : 'block';
  document.getElementById('photo-wrap').style.display = isPhoto ? 'block' : 'none';
  document.getElementById('field-label').textContent = mode === 'upc' ? 'BARCODE NUMBER' : 'PRODUCT NAME';
  document.getElementById('text-input').placeholder = mode === 'upc' ? 'e.g. 021130126026' : 'e.g. Honey Nut Cheerios';
  document.getElementById('hint-text').textContent = mode === 'upc' ? 'Type the number under the barcode' : 'One product at a time — be specific with brand name';
  hideError();
}

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imageBase64 = e.target.result.split(',')[1];
    document.getElementById('preview').src = e.target.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('drop-inner').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.style.display = 'block';
}
function hideError() { document.getElementById('error-box').style.display = 'none'; }

async function scan() {
  hideError();
  const btn = document.getElementById('scan-btn');

  let prompt;
  if (currentMode === 'upc') {
    const val = document.getElementById('text-input').value.trim();
    if (!val) { showError('Enter a UPC code'); return; }
    prompt = `Look up UPC ${val} and analyze the product for my health profile. Respond only with the JSON object.`;
  } else if (currentMode === 'search') {
    const val = document.getElementById('text-input').value.trim();
    if (!val) { showError('Enter a product name'); return; }
    prompt = `Analyze this food product for my health profile: "${val}". Use your knowledge of this product's nutrition facts and ingredients. Respond only with the JSON object, nothing else.`;
  } else {
    if (!imageBase64) { showError('Upload a photo first'); return; }
    prompt = 'Analyze this nutrition label for my health profile. Read all nutrients and ingredients. Respond only with the JSON object.';
  }

  btn.disabled = true;
  btn.textContent = 'SCANNING...';

  try {
    const content = [];
    if (currentMode === 'photo' && imageBase64) {
      content.push({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: imageBase64 } });
    }
    content.push({ type: 'text', text: prompt });

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error('API ' + response.status + ': ' + (err.error?.message || 'unknown'));
    }

    const data = await response.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '';
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON in response: ' + text.slice(0, 100));
    const result = JSON.parse(match[0]);
    showResult(result);
  } catch (e) {
    showError(e.message || 'Something went wrong');
  } finally {
    btn.disabled = false;
    btn.textContent = 'SCAN THIS PRODUCT →';
  }
}

function showResult(r) {
  document.getElementById('input-card').style.display = 'none';
  document.getElementById('result-wrap').style.display = 'flex';

  // Score ring
  const circ = 2 * Math.PI * 42;
  const fill = (r.score / 10) * circ;
  const color = r.score >= 8 ? '#4ade80' : r.score >= 5 ? '#fbbf24' : '#f87171';
  const ring = document.getElementById('ring-fill');
  ring.style.stroke = color;
  ring.setAttribute('stroke-dasharray', fill + ' ' + circ);
  document.getElementById('ring-score-text').textContent = r.score;
  document.getElementById('ring-score-text').style.color = color;

  // Product + verdict
  document.getElementById('product-name-text').textContent = r.productName;
  const badge = document.getElementById('verdict-badge');
  const colors = { green: ['#052e16','#16a34a','#4ade80'], yellow: ['#1c1400','#d97706','#fbbf24'], red: ['#1a0000','#dc2626','#f87171'] };
  const [bg, border, text] = colors[r.verdictColor] || colors.yellow;
  badge.style.cssText = `background:${bg};border:1px solid ${border};color:${text};display:inline-flex;padding:6px 16px;border-radius:6px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;letter-spacing:0.12em;`;
  badge.textContent = r.verdict;

  // Nutrients
  const grid = document.getElementById('nutrient-grid');
  grid.innerHTML = '';
  const labels = { saturatedFat: 'Sat. Fat', transFat: 'Trans Fat', addedSugars: 'Added Sugar', fiber: 'Fiber' };
  if (r.nutritionHighlights) {
    Object.entries(r.nutritionHighlights).forEach(([k, v]) => {
      const isBad = (k==='saturatedFat'&&parseFloat(v)>3)||(k==='transFat'&&parseFloat(v)>0)||(k==='addedSugars'&&parseFloat(v)>6);
      const isGood = k==='fiber'&&parseFloat(v)>=3;
      const cell = document.createElement('div');
      cell.className = 'nutrient-cell';
      cell.style.cssText = `background:${isBad?'#1a0000':isGood?'#052e16':'#080d14'};border:1px solid ${isBad?'#7f1d1d':isGood?'#14532d':'#1e293b'};border-radius:8px;padding:10px 12px;`;
      cell.innerHTML = `<div class="nutrient-key">${labels[k]||k}</div><div class="nutrient-val" style="color:${isBad?'#f87171':isGood?'#4ade80':'#94a3b8'}">${v||'—'}</div>`;
      grid.appendChild(cell);
    });
  }

  // Reasons
  const list = document.getElementById('reasons-list');
  list.innerHTML = '';
  (r.reasons||[]).forEach((reason, i) => {
    const row = document.createElement('div');
    row.className = 'reason-row';
    const icon = i === 0 ? (r.verdictColor === 'green' ? '✓' : '⚠') : '·';
    row.innerHTML = `<span class="reason-icon">${icon}</span><p class="reason-text">${reason}</p>`;
    list.appendChild(row);
  });

  // Flagged
  const flagCard = document.getElementById('flag-card');
  const chips = document.getElementById('flag-chips');
  if (r.flaggedIngredients?.length > 0) {
    chips.innerHTML = r.flaggedIngredients.map(i => `<span class="flag-chip">${i}</span>`).join('');
    flagCard.style.display = 'block';
  } else {
    flagCard.style.display = 'none';
  }

  window.scrollTo(0, 0);
}

function reset() {
  document.getElementById('input-card').style.display = 'flex';
  document.getElementById('result-wrap').style.display = 'none';
  document.getElementById('text-input').value = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('drop-inner').style.display = 'block';
  imageBase64 = null;
  hideError();
}
</script>
</body>
</html>
